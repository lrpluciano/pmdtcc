<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Conversão com Passos</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .calc-card { background: white; width: 100%; max-width: 800px; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; color: var(--primary); }
        
        .input-group { display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: #1d4ed8; }

        .result-box { background: #f1f5f9; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 2px dashed #cbd5e1; }
        .result-val { font-size: 1.8rem; font-weight: 800; color: var(--primary); display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-size: 0.9rem; text-transform: uppercase; color: #64748b; }
        .highlight { color: #e11d48; font-weight: bold; }
        .steps-container { display: none; }
    </style>
</head>
<body>

<div class="calc-card">
    <h1>🔢 Calculadora de Base (Passo a Passo)</h1>

    <div class="input-group">
        <input type="number" id="decValue" placeholder="Valor Decimal (ex: 156)" min="0">
        <select id="targetBase">
            <option value="2">Binário (Base 2)</option>
            <option value="8">Octal (Base 8)</option>
            <option value="16">Hexadecimal (Base 16)</option>
        </select>
        <button onclick="converter()">Converter</button>
    </div>

    <div id="stepsArea" class="steps-container">
        <div class="result-box">
            <span>Resultado Final:</span>
            <span id="finalRes" class="result-val">-</span>
        </div>

        <h3>📝 Processo de Divisões Sucessivas</h3>
        <p><small>Dividimos o número pela base e usamos o <strong>resto</strong> para montar o resultado do fim para o começo.</small></p>
        
        <table>
            <thead>
                <tr>
                    <th>Dividendo</th>
                    <th>Base</th>
                    <th>Quociente</th>
                    <th>Resto (Dígito)</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
function converter() {
    let num = parseInt(document.getElementById('decValue').value);
    const base = parseInt(document.getElementById('targetBase').value);
    const tableBody = document.getElementById('tableBody');
    const stepsArea = document.getElementById('stepsArea');
    const finalRes = document.getElementById('finalRes');

    if (isNaN(num)) { alert("Insira um número válido"); return; }

    let originalNum = num;
    let resultDigits = [];
    tableBody.innerHTML = "";
    stepsArea.style.display = "block";

    if (num === 0) {
        resultDigits.push(0);
        addRow(0, base, 0, 0);
    }

    while (num > 0) {
        let resto = num % base;
        let quociente = Math.floor(num / base);
        
        let displayResto = resto;
        if (base === 16 && resto >= 10) {
            displayResto = String.fromCharCode(55 + resto) + ` (${resto})`;
        }

        addRow(num, base, quociente, displayResto);
        
        resultDigits.push(base === 16 && resto >= 10 ? String.fromCharCode(55 + resto) : resto);
        num = quociente;
    }

    finalRes.innerText = resultDigits.reverse().join("");
}

function addRow(d, b, q, r) {
    const row = `<tr>
        <td>${d}</td>
        <td>${b}</td>
        <td>${q}</td>
        <td class="highlight">${r}</td>
    </tr>`;
    document.getElementById('tableBody').innerHTML += row;
}
</script>

</body>
</html>
